# ====================================================================
#  LoginBonus & LoanSystem (ローンシステム) - 設定ファイル
# ====================================================================

# --------------------------------------------------------------------
#  1. ログインボーナス設定 (デイリー報酬)
# --------------------------------------------------------------------
login-bonus:
  # GUI画面を開いたときのタイトル (マイクラの色コード「&」が使えます)
  gui-title: "&d&l本日のログインボーナス"

  # 1日あたりに一律でもらえる基本の支給額
  base-reward: 1000

  # 前日にログインしなかった場合、連続ログインカウントをリセットするかどうか
  # true  -> 1日でもログインを逃すと、また「1日目」からやり直しになります。
  # false -> ログインを逃しても進捗が維持され、次回来たときに続きから受け取れます。
  reset-on-miss: true

  # 月が替わって「1日」になったとき、全員の連続カウントを強制リセットするかどうか
  # true  -> 月の切り替わりと同時に全員 1日目 からリスタート（月ごとの限定報酬を狙わせるのに最適）
  # false -> 月が替わっても、先月からの連続カウント数をそのまま引き継ぎます。
  reset-on-new-month: true

  # 【月替わり連続ログインボーナス報酬リスト】
  # システムの月（1〜12月）と自動連動します。
  # 表記: 「連続ログイン日数: 追加されるボーナス金額」
  # ※ 日数は1〜31日まで、config側で自由に追加・削除・金額調整が可能です。
  monthly-streaks:
    month-1: # 1月（お年玉・正月イベント）
      3: 1000
      7: 3500
      14: 8000
      30: 20000
    month-2: # 2月（通常月）
      3: 500
      7: 2000
      14: 5000
    month-3: # 3月（春休み・卒業シーズン）
      3: 600
      7: 2500
      14: 6000
    month-4: # 4月（新生活応援）
      3: 800
      7: 3000
      14: 7000
    month-5: # 5月（ゴールデンウィーク）
      3: 1000
      7: 3500
      14: 8000
    month-6: # 6月（梅雨シーズン）
      3: 500
      7: 2500
      14: 5500
    month-7: # 7月（夏休み前半）
      3: 1000
      7: 4000
      14: 9000
      30: 25000
    month-8: # 8月（夏休み本番・特大ボーナス）
      3: 1200
      7: 5000
      14: 10000
      30: 30000
    month-9: # 9月（通常月）
      3: 500
      7: 2000
      14: 5000
    month-10: # 10月（ハロウィン）
      3: 600
      7: 2500
      14: 6000
    month-11: # 11月（通常月）
      3: 500
      7: 2000
      14: 5000
    month-12: # 12月（年末・クリスマス）
      3: 1500
      7: 6000
      14: 12000
      30: 35000

# --------------------------------------------------------------------
#  2. ローンシステム設定
# --------------------------------------------------------------------
loan:
  # ローン窓口GUIのタイトル
  gui-title: "&4&l【ローン窓口】借入・返済"

  # 1人が借りられる「元金＋利息」の最大限界額
  max-limit: 100000

  # 画面のボタンを1回クリックしたときに動く、借入・返済の単位金額
  unit: 10000

  # ログインボーナスを差し押さえる（受け取れなくする）借入額の境界線
  # 借入の総額がこの金額以上になると、デイリーカレンダーの画面を開くことができなくなります。
  block-bonus-threshold: 50000

  # リアル24時間（1日）ごとに、未返済の借入総額に加算される利息（金利）の割合
  # 例: 0.05 = 5%（1万円借りていると、翌日には自動で利息 500円 が加算されます。複利計算）
  # 0.00 にすると利息は発生しなくなります。
  interest-rate: 0.05

  # 全額返済までの猶予日数（期限）
  # お金を最初に借りたタイミングからカウントがスタートします。
  # この日数を超えて借金が1円でも残っている場合、上記の「差し押さえ境界線（5万円）」に関わらず、
  # ログインボーナスが強制的にロック（差し押さえ）されます。
  due-days: 7

# ====================================================================
#  銀行システム設定 (Bank System Settings)
# ====================================================================
bank:
  # 銀行口座に貯められる最大金額 (整数)
  max-limit: 10000000

  # 定期利息の金利 (小数。例: 0.02 = 2%)
  interest-rate: 0.02

  # 利息を付与する周期 (時間単位。例: 24 = 24時間ごと)
  interest-interval-hours: 24

  # 銀行GUIのタイトル設定
  gui-title: "&1&l【Feaber MC 銀行】預金・引出"
