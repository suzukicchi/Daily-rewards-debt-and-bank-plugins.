# ==========================================
#  LoginBonus & LoanSystem (ローン窓口) - メッセージ設定ファイル
# ==========================================
#  Message Configuration File
# ==========================================

# チャット表示に使う接頭辞（プレフィックス）
prefix:
  login: "&b[ログインボーナス] &r"
  loan: "&4[ローン窓口] &r"
  admin: "&d[LoginBonus-Admin] &r"

# ------------------------------------------
#  ログインボーナス関連のメッセージ
# ------------------------------------------
login-bonus:
  # 基本報酬を受け取った時のメッセージ
  # %amount% : config.yml の base-reward の値
  success: "&a本日のログインボーナス &e%amount%円 &aを受け取りました！"

  # その日、既に受け取り済みの場合のメッセージ
  claimed-already: "&c本日のログインボーナスはすでに受け取り済みです。また明日お越しください！"

  # 特定の連続ログイン日数を達成し、マンスリーボーナスが加算された時のメッセージ
  # %month% : 現在の月 / %streak% : 達成した日数 / %amount% : configの該当ボーナス額
  streak-success: "&e祝・%month%月度！&b%streak%日目達成ボーナス &e+%amount%円 &aがさらに加算されました！"

  # 借入総額が閾値を超え、ログインボーナス画面が開けない（差し押さえ）時の警告
  seizure-denied: "&c【警告】あなたはローン窓口での借入額が多すぎるため、本日のログインボーナスは差し押さえられました。先に返済してください！"

# ------------------------------------------
#  ローンシステム関連のメッセージ
# ------------------------------------------
loan:
  # 借入（お金を借りる）に成功した時
  borrow-success: "&a&l[借入成功] &e%amount%円 &aの借入を行いました。現在の借入総額: &c%total%円"
  
  # 返済（お金を返す）に成功した時
  repay-success: "&d&l[返済成功] &e%amount%円 &d返済しました。残り借入総額: &c%total%円"
  
  # 借入総額が上限（10万円）に達してこれ以上借りられない時
  over-limit: "&cこれ以上の借入はできません。お客様の限度額は %limit%円 です。"
  
  # 借金がないのに返済ボタンを押した時
  no-debt: "&a返済する必要のあるローン（借入）はありません。クリーンなご利用ありがとうございます。"
  
  # 手持ちの現金が足りなくて返済できない時
  insufficient-funds: "&c返済に必要な現金（%amount%円）が足りません。"
  
  # 窓口が使えない時のセーフティ用
  window-ready: "&c[システム] ローン窓口は現在準備中です。"

# ------------------------------------------
#  【新設】管理者コマンド関連のメッセージ
# ------------------------------------------
admin:
  # 設定ファイルをリロードした時
  reload-success: "&aConfig.yml のリロードが完了しました。"
  
  # 権限がないプレイヤーがコマンドを叩いた時
  no-permission: "&cあなたにはこのコマンドを実行する権限がありません。"
